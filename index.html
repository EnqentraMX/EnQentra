<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EnQentraMX</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#081c15;
      color:white;
    }

    nav{
      width:100%;
      padding:20px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:#0b2a21;
      position:sticky;
      top:0;
      z-index:999;
    }

    .logo{
      font-size:32px;
      font-weight:bold;
      color:white;
      cursor:pointer;
    }

    .logo span{
      color:#d4af37;
    }

    .menu{
      display:flex;
      gap:20px;
      align-items:center;
    }

    .menu a{
      color:white;
      text-decoration:none;
      cursor:pointer;
    }

    .hero{
      padding:80px 20px;
      text-align:center;
      background:linear-gradient(180deg,#0b2a21,#14532d);
    }

    .hero h1{
      font-size:60px;
      margin-bottom:20px;
    }

    .hero h1 span{
      color:#d4af37;
      font-style:italic;
    }

    .hero p{
      max-width:700px;
      margin:auto;
      font-size:18px;
      opacity:.8;
    }

    .container{
      width:90%;
      max-width:1200px;
      margin:auto;
    }

    .section-title{
      font-size:36px;
      margin-bottom:30px;
    }

    .tours-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:20px;
      margin-top:40px;
      margin-bottom:80px;
    }

    .tour-card{
      background:white;
      color:black;
      border-radius:14px;
      overflow:hidden;
      cursor:pointer;
    }

    .tour-card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .tour-content{
      padding:20px;
    }

    .tour-content h3{
      margin-bottom:10px;
    }

    .price{
      font-size:24px;
      font-weight:bold;
      color:#14532d;
      margin-top:10px;
    }

    .btn{
      margin-top:15px;
      background:#14532d;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:10px;
      cursor:pointer;
    }

    .section{
      display:none;
    }

    .active{
      display:block;
    }

    .agency-header{
      padding:60px 20px;
      background:#14532d;
    }

    .agency-header h1{
      font-size:48px;
      margin-bottom:10px;
    }

    .admin-panel{
      padding:40px 20px;
    }

    .admin-box{
      background:white;
      color:black;
      padding:20px;
      border-radius:14px;
      margin-bottom:20px;
    }

    input,
    textarea,
    select{
      width:100%;
      padding:14px;
      margin-top:10px;
      margin-bottom:20px;
      border-radius:10px;
      border:1px solid #ccc;
    }

    .hidden{
      display:none;
    }
  </style>
</head>
<body>

<nav>
  <div class="logo" onclick="goHome()">
    EnQentra<span>MX</span>
  </div>

  <div class="menu">
    <a onclick="goHome()">Inicio</a>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="section active">

  <div class="hero">
    <h1>
      Descubre <span>tours auténticos</span> en México
    </h1>

    <p>
      Conecta con agencias reales y descubre experiencias increíbles.
    </p>
  </div>

  <div class="container" style="padding-top:60px;">
    <h2 class="section-title">Tours destacados</h2>

    <div class="tours-grid" id="toursGrid"></div>
  </div>

</div>

<!-- AGENCY -->
<div id="agencyPage" class="section">

  <div class="agency-header">
    <div class="container">
      <h1 id="agencyName"></h1>
      <p id="agencyDesc"></p>
    </div>
  </div>

  <div class="container" style="padding-top:40px;">
    <div class="tours-grid" id="agencyTours"></div>
  </div>

</div>

<!-- ADMIN -->
<div id="adminPanel" class="section">

  <div class="container admin-panel">

    <div class="admin-box">
      <h2>Crear Agencia</h2>

      <input type="text" id="agencyNameInput" placeholder="Nombre"/>
      <textarea id="agencyDescInput" placeholder="Descripción"></textarea>

      <button class="btn" onclick="createAgency()">
        Crear Agencia
      </button>
    </div>

    <div class="admin-box">
      <h2>Crear Tour</h2>

      <select id="tourAgency"></select>

      <input type="text" id="tourName" placeholder="Nombre tour"/>

      <input type="text" id="tourImage" placeholder="URL imagen"/>

      <input type="number" id="tourPrice" placeholder="Precio"/>

      <button class="btn" onclick="createTour()">
        Crear Tour
      </button>
    </div>

  </div>

</div>

<script>

const SUPABASE_URL = 'https://iaemzeidkyxayhsiunmt.supabase.co';

const SUPABASE_KEY = 'sb_publishable_ueHRY8Ev4QO_tF8xc6voRg_boBBXWUR';

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

console.log('SUPABASE OK');

let agencies = {};

function goHome(){

  document.querySelectorAll('.section').forEach(sec=>{
    sec.classList.remove('active');
  });

  document.getElementById('home').classList.add('active');

  loadHome();
}

function openAgency(slug){

  const agency = agencies[slug];

  if(!agency) return;

  document.querySelectorAll('.section').forEach(sec=>{
    sec.classList.remove('active');
  });

  document.getElementById('agencyPage').classList.add('active');

  document.getElementById('agencyName').textContent = agency.name;

  document.getElementById('agencyDesc').textContent = agency.description;

  const grid = document.getElementById('agencyTours');

  grid.innerHTML = '';

  agency.tours.forEach(tour=>{

    grid.innerHTML += `
      <div class="tour-card">
        <img src="${tour.image}">
        <div class="tour-content">
          <h3>${tour.name}</h3>
          <div class="price">$${tour.price}</div>
        </div>
      </div>
    `;

  });

}

function loadHome(){

  const grid = document.getElementById('toursGrid');

  grid.innerHTML = '';

  Object.keys(agencies).forEach(slug=>{

    const agency = agencies[slug];

    agency.tours.forEach(tour=>{

      grid.innerHTML += `
        <div class="tour-card" onclick="openAgency('${slug}')">

          <img src="${tour.image}">

          <div class="tour-content">

            <h3>${tour.name}</h3>

            <p>${agency.name}</p>

            <div class="price">
              $${tour.price}
            </div>

            <button class="btn">
              Ver agencia
            </button>

          </div>

        </div>
      `;

    });

  });

}

async function createAgency(){

  const name =
    document.getElementById('agencyNameInput').value;

  const desc =
    document.getElementById('agencyDescInput').value;

  const slug =
    name
      .toLowerCase()
      .replace(/\s/g,'');

  const { error } = await supabaseClient
    .from('agencies')
    .insert([
      {
        name: name,
        description: desc,
        slug: slug
      }
    ]);

  if(error){
    console.log(error);
    alert('Error creando agencia');
    return;
  }

  alert('Agencia creada');

  await loadAgencies();
}

function updateAgencySelect(){

  const select = document.getElementById('tourAgency');

  select.innerHTML = '';

  Object.keys(agencies).forEach(slug=>{

    select.innerHTML += `
      <option value="${slug}">
        ${agencies[slug].name}
      </option>
    `;

  });

}

async function createTour(){

  const slug =
    document.getElementById('tourAgency').value;

  const name =
    document.getElementById('tourName').value;

  const image =
    document.getElementById('tourImage').value;

  const price =
    parseInt(
      document.getElementById('tourPrice').value
    );

  const { error } = await supabaseClient
    .from('tours')
    .insert([
      {
        agency_slug: slug,
        name: name,
        image: image,
        price: price
      }
    ]);

  if(error){
    console.log(error);
    alert('Error al guardar');
    return;
  }

  alert('Tour guardado');

  await loadAgencies();
}
  loadHome();

  alert('Tour creado');

}

window.addEventListener('keydown', function(e){

  if(e.ctrlKey && e.key === 'm'){

    document.querySelectorAll('.section').forEach(sec=>{
      sec.classList.remove('active');
    });

    document.getElementById('adminPanel').classList.add('active');

  }

});

agencies = {
async function loadAgencies() {

  const { data: agenciesData } =
    await supabaseClient
      .from('agencies')
      .select('*');

  const { data: toursData } =
    await supabaseClient
      .from('tours')
      .select('*');

  agencies = {};

  agenciesData.forEach(agency => {

    agencies[agency.slug] = {
      name: agency.name,
      description: agency.description,
      tours: toursData.filter(
        t => t.agency_slug === agency.slug
      )
    };

  });

  updateAgencySelect();

  loadHome();
}

loadAgencies();

</script>

</body>
</html>
