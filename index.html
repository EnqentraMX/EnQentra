<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8"/>

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>EnQentraMX</title>

<link
rel="preconnect"
href="https://fonts.googleapis.com"
/>

<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin
/>

<link
href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap"
rel="stylesheet"
/>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--green:#071f17;
--green2:#0d3b2f;
--green3:#14532d;
--gold:#d4af37;
--white:#ffffff;
--bg:#f7f5ef;
--text:#111111;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* ===== NAV ===== */

nav{
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
background:rgba(7,31,23,.92);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,.08);
}

.nav-container{
width:92%;
max-width:1300px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 0;
}

.logo{
font-size:42px;
font-family:'Playfair Display',serif;
font-weight:700;
color:white;
cursor:pointer;
}

.logo span{
color:var(--gold);
}

.nav-links{
display:flex;
gap:35px;
}

.nav-links a{
color:white;
text-decoration:none;
font-size:15px;
cursor:pointer;
opacity:.9;
transition:.2s;
}

.nav-links a:hover{
color:var(--gold);
}

.admin-btn{
border:none;
background:var(--gold);
color:#111;
padding:14px 24px;
border-radius:14px;
font-weight:700;
cursor:pointer;
}

/* ===== HERO ===== */

.hero{
min-height:100vh;

background:
linear-gradient(
rgba(4,19,15,.76),
rgba(4,19,15,.86)
),

url('https://images.unsplash.com/photo-1512813195386-6cf811ad3542?q=80&w=1400&auto=format&fit=crop');

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;
text-align:center;

padding:140px 20px 100px;
}

.hero-content{
max-width:1000px;
}

.hero-badge{
display:inline-block;
padding:12px 24px;
border-radius:40px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
color:#ddd;
font-size:14px;
margin-bottom:28px;
backdrop-filter:blur(10px);
}

.hero h1{
font-size:92px;
line-height:1;
font-family:'Playfair Display',serif;
color:white;
margin-bottom:30px;
}

.hero h1 span{
color:var(--gold);
font-style:italic;
}

.hero p{
max-width:850px;
margin:auto;
font-size:22px;
line-height:1.6;
color:#ddd;
}

/* ===== CONTAINER ===== */

.container{
width:92%;
max-width:1300px;
margin:auto;
}

/* ===== SECTIONS ===== */

.section{
display:none;
}

.section.active{
display:block;
}

.section-sub{
color:var(--green3);
font-size:14px;
letter-spacing:3px;
text-transform:uppercase;
margin-bottom:18px;
}

.section-title{
font-size:58px;
font-family:'Playfair Display',serif;
margin-bottom:50px;
}

/* ===== TOURS ===== */

.tours-section{
padding:100px 0;
}

.tours-grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(340px,1fr));
gap:30px;
}

.tour-card{
background:white;
border-radius:26px;
overflow:hidden;
box-shadow:
0 10px 40px rgba(0,0,0,.08);
transition:.25s;
cursor:pointer;
}

.tour-card:hover{
transform:translateY(-8px);
}

.tour-image{
width:100%;
height:260px;
object-fit:cover;
background:#ddd;
}

.tour-content{
padding:28px;
}

.agency-name{
font-size:14px;
font-weight:700;
text-transform:uppercase;
color:var(--green3);
margin-bottom:12px;
}

.tour-title{
font-size:34px;
font-family:'Playfair Display',serif;
line-height:1.1;
margin-bottom:18px;
}

.tour-price{
font-size:36px;
font-weight:800;
color:var(--green3);
margin-bottom:20px;
}

.card-btn{
width:100%;
border:none;
background:var(--green3);
color:white;
padding:16px;
border-radius:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
}

/* ===== AGENCY ===== */

.agency-hero{
padding:180px 20px 100px;

background:
linear-gradient(
rgba(0,0,0,.65),
rgba(0,0,0,.72)
),

url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1400&auto=format&fit=crop');

background-size:cover;
background-position:center;

color:white;
}

.agency-hero h1{
font-size:74px;
font-family:'Playfair Display',serif;
margin-bottom:18px;
}

.agency-hero p{
max-width:700px;
font-size:18px;
line-height:1.7;
color:#ddd;
}

/* ===== ADMIN ===== */

.admin-section{
padding:140px 0 100px;
}

.admin-box{
background:white;
padding:35px;
border-radius:24px;
margin-bottom:30px;

box-shadow:
0 10px 40px rgba(0,0,0,.08);
}

.admin-box h2{
font-size:36px;
margin-bottom:24px;
font-family:'Playfair Display',serif;
}

input,
textarea,
select{
width:100%;
padding:16px;
border-radius:14px;
border:1px solid #ddd;
font-size:15px;
margin-bottom:18px;
outline:none;
}

textarea{
resize:none;
min-height:120px;
}

.primary-btn{
border:none;
background:var(--green3);
color:white;
padding:16px 24px;
border-radius:14px;
font-weight:700;
cursor:pointer;
}

/* ===== FOOTER ===== */

.footer{
background:var(--green);
padding:60px 20px;
text-align:center;
color:white;
}

/* ===== RESPONSIVE ===== */

@media(max-width:900px){

.hero h1{
font-size:58px;
}

.hero p{
font-size:18px;
}

.section-title{
font-size:42px;
}

.agency-hero h1{
font-size:52px;
}

.nav-links{
display:none;
}

}

</style>

</head>

<body>

<!-- NAV -->

<nav>

<div class="nav-container">

<div
class="logo"
onclick="goHome()"
>
EnQentra<span>MX</span>
</div>

<div class="nav-links">

<a onclick="goHome()">Inicio</a>

<a onclick="goHome()">Destinos</a>

<a onclick="goHome()">Agencias</a>

</div>

<button
class="admin-btn"
onclick="showSection('adminPanel')"
>
Admin
</button>

</div>

</nav>

<!-- HOME -->

<section
id="home"
class="section active"
>

<div class="hero">

<div class="hero-content">

<div class="hero-badge">
✨ EXPERIENCIAS AUTÉNTICAS EN MÉXICO
</div>

<h1>
Descubre
<span>tours auténticos</span>
en México
</h1>

<p>
Conecta con agencias reales y vive
experiencias inmersivas en los destinos
más increíbles del país.
</p>

</div>

</div>

<div class="tours-section">

<div class="container">

<div class="section-sub">
LO MÁS VENDIDO
</div>

<h2 class="section-title">
Tours destacados
</h2>

<div
class="tours-grid"
id="toursGrid"
></div>

</div>

</div>

</section>

<!-- AGENCY -->

<section
id="agencyPage"
class="section"
>

<div class="agency-hero">

<div class="container">

<h1 id="agencyName"></h1>

<p id="agencyDesc"></p>

</div>

</div>

<div class="tours-section">

<div class="container">

<div
class="tours-grid"
id="agencyTours"
></div>

</div>

</div>

</section>

<!-- ADMIN -->

<section
id="adminPanel"
class="section"
>

<div class="container admin-section">

<div class="admin-box">

<h2>
Crear Agencia
</h2>

<input
type="text"
id="agencyNameInput"
placeholder="Nombre agencia"
/>

<textarea
id="agencyDescInput"
placeholder="Descripción"
></textarea>

<button
class="primary-btn"
onclick="createAgency()"
>
Crear Agencia
</button>

</div>

<div class="admin-box">

<h2>
Crear Tour
</h2>

<select id="tourAgency"></select>

<input
type="text"
id="tourName"
placeholder="Nombre tour"
/>

<input
type="text"
id="tourImage"
placeholder="URL imagen"
/>

<input
type="number"
id="tourPrice"
placeholder="Precio"
/>

<button
class="primary-btn"
onclick="createTour()"
>
Crear Tour
</button>

</div>

</div>

</section>

<!-- FOOTER -->

<div class="footer">

<p>
EnQentraMX © 2026
</p>

</div>

<script>

let agencies = {};

let supabaseClient;

/* ===== INIT ===== */

window.addEventListener('load', async ()=>{

if(typeof supabase === 'undefined'){

console.error('SUPABASE NO CARGÓ');

alert('Error cargando Supabase');

return;

}

const SUPABASE_URL =
'https://iaemzeidkyxayhsiunmt.supabase.co';

const SUPABASE_KEY =
'sb_publishable_ueHRY8Ev4QO_tF8xc6voRg_boBBXWUR';

supabaseClient =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

window.supabaseClient = supabaseClient;

console.log('SUPABASE CONECTADO');

await loadAgencies();

});

/* ===== UI ===== */

function showSection(id){

document
.querySelectorAll('.section')
.forEach(section=>{

section.classList.remove('active');

});

document
.getElementById(id)
.classList.add('active');

window.scrollTo(0,0);

}

function goHome(){

showSection('home');

loadHome();

}

/* ===== OPEN AGENCY ===== */

function openAgency(slug){

const agency = agencies[slug];

if(!agency) return;

showSection('agencyPage');

document
.getElementById('agencyName')
.textContent = agency.name;

document
.getElementById('agencyDesc')
.textContent =
agency.description || '';

const grid =
document.getElementById('agencyTours');

grid.innerHTML = '';

agency.tours.forEach(tour=>{

grid.innerHTML += `

<div class="tour-card">

<img
class="tour-image"
src="${tour.image}"
>

<div class="tour-content">

<div class="agency-name">
${agency.name}
</div>

<h3 class="tour-title">
${tour.name}
</h3>

<div class="tour-price">
$${tour.price}
</div>

<button class="card-btn">
Reservar
</button>

</div>

</div>

`;

});

}

/* ===== HOME ===== */

function loadHome(){

const grid =
document.getElementById('toursGrid');

grid.innerHTML = '';

Object.keys(agencies).forEach(slug=>{

const agency = agencies[slug];

agency.tours.forEach(tour=>{

grid.innerHTML += `

<div
class="tour-card"
onclick="openAgency('${slug}')"
>

<img
class="tour-image"
src="${tour.image}"
>

<div class="tour-content">

<div class="agency-name">
${agency.name}
</div>

<h3 class="tour-title">
${tour.name}
</h3>

<div class="tour-price">
$${tour.price}
</div>

<button class="card-btn">
Ver Tour
</button>

</div>

</div>

`;

});

});

}

/* ===== SELECT ===== */

function updateAgencySelect(){

const select =
document.getElementById('tourAgency');

select.innerHTML = '';

Object.keys(agencies).forEach(slug=>{

select.innerHTML += `

<option value="${slug}">
${agencies[slug].name}
</option>

`;

});

}

/* ===== CREATE AGENCY ===== */

async function createAgency(){

const name =
document
.getElementById('agencyNameInput')
.value
.trim();

const desc =
document
.getElementById('agencyDescInput')
.value
.trim();

if(!name){

alert('Ingresa nombre');

return;

}

const slug =
name
.toLowerCase()
.replace(/\s+/g,'')
.replace(/[^a-z0-9]/g,'');

const { error } =
await supabaseClient
.from('agencies')
.insert([
{
name:name,
description:desc,
slug:slug
}
]);

if(error){

console.log(error);

alert('Error creando agencia');

return;

}

alert('Agencia creada');

await loadAgencies();

}

/* ===== CREATE TOUR ===== */

async function createTour(){

const slug =
document
.getElementById('tourAgency')
.value;

const name =
document
.getElementById('tourName')
.value
.trim();

const image =
document
.getElementById('tourImage')
.value
.trim();

const price =
parseInt(
document
.getElementById('tourPrice')
.value
);

if(!slug || !name){

alert('Completa datos');

return;

}

const { error } =
await supabaseClient
.from('tours')
.insert([
{
agency_slug:slug,
name:name,
image:image,
price:price
}
]);

if(error){

console.log(error);

alert('Error guardando tour');

return;

}

alert('Tour creado');

await loadAgencies();

}

/* ===== LOAD ===== */

async function loadAgencies(){

const {
data: agenciesData,
error: agenciesError
}
=
await supabaseClient
.from('agencies')
.select('*');

const {
data: toursData,
error: toursError
}
=
await supabaseClient
.from('tours')
.select('*');

console.log(agenciesData);
console.log(toursData);

if(agenciesError){

console.log(agenciesError);

return;

}

if(toursError){

console.log(toursError);

return;

}

agencies = {};

agenciesData.forEach(agency=>{

agencies[agency.slug] = {

name:agency.name,

description:
agency.description || '',

tours:
toursData.filter(
t => t.agency_slug === agency.slug
)

};

});

updateAgencySelect();

loadHome();

}

</script>

</body>

</html>
